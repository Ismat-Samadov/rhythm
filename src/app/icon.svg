<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Dark background -->
  <rect width="64" height="64" rx="12" fill="#050510"/>

  <!-- Neon lane lines (vertical) -->
  <rect x="10" y="8"  width="6" height="48" rx="3" fill="#00f5ff" opacity="0.9"/>
  <rect x="22" y="8"  width="6" height="48" rx="3" fill="#bf00ff" opacity="0.9"/>
  <rect x="34" y="8"  width="6" height="48" rx="3" fill="#ffff00" opacity="0.9"/>
  <rect x="46" y="8"  width="6" height="48" rx="3" fill="#ff007f" opacity="0.9"/>

  <!-- Notes (offset rectangles on each lane) -->
  <rect x="11" y="16" width="4" height="10" rx="2" fill="#00f5ff"/>
  <rect x="23" y="28" width="4" height="10" rx="2" fill="#bf00ff"/>
  <rect x="35" y="20" width="4" height="10" rx="2" fill="#ffff00"/>
  <rect x="47" y="34" width="4" height="10" rx="2" fill="#ff007f"/>

  <!-- Hit zone line -->
  <rect x="6" y="46" width="52" height="2" rx="1" fill="white" opacity="0.6"/>

  <!-- Glow effects via blur filters -->
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
</svg>
